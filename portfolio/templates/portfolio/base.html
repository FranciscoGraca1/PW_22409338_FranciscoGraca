<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Francisco Graça</title>
    <!-- Bootstrap para o design bonito -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: #f8f9fa;
            padding: 60px 0;
            border-bottom: 1px solid #dee2e6;
            text-align: center;
        }
        .tech-card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Francisco Graça</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'portfolio:home' %}">Home</a>
                <!-- Link para o Making Of (importante para a nota) -->
                <a class="nav-link" href="#">Making Of</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 mt-5 border-top">
        <p>&copy; 2026 Francisco Graça - Engenharia Informática ULHT</p>
    </footer>
</body>
</html>
