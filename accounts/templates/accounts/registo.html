{% extends 'portfolio/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h3 class="mb-4 text-center">Criar conta</h3>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              <input type="{{ field.field.widget.input_type }}"
                     name="{{ field.html_name }}"
                     class="form-control {% if field.errors %}is-invalid{% endif %}">
              {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
              {% if field.help_text %}
                <div class="form-text text-muted small">{{ field.help_text }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-success w-100">Registar</button>
        </form>
        <p class="text-center mt-3 small">
          Já tens conta? <a href="{% url 'accounts:login' %}">Entrar</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
