<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisco Graça | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; }
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 2rem;
            position: relative;
        }
        .hero-content { position: relative; z-index: 1; }
        .hero-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 1.5rem;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .hero .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            opacity: 0.8;
            margin-bottom: 2.5rem;
            max-width: 600px;
        }
        .hero-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .hero-nav a {
            padding: 0.5rem 1.4rem;
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .hero-nav a:hover {
            background: rgba(255,255,255,0.15);
            border-color: white;
        }
        .hero-nav a.highlight {
            background: #4f8ef7;
            border-color: #4f8ef7;
        }
        .hero-nav a.highlight:hover { background: #3a7be0; }
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }
        .auth-bar {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }
        .auth-bar a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: 0.2s;
        }
        .auth-bar a:hover { color: white; border-color: white; }
    </style>
</head>
<body>

<section class="hero">

    <div class="auth-bar">
        {% if user.is_authenticated %}
            <span style="color:rgba(255,255,255,0.6); font-size:.85rem; padding:.3rem .8rem;">👤 {{ user.username }}</span>
            <a href="{% url 'accounts:logout' %}">Sair</a>
        {% else %}
            <a href="{% url 'accounts:login' %}">Entrar</a>
            <a href="{% url 'accounts:registo' %}">Registar</a>
        {% endif %}
    </div>

    <div class="hero-content">
        <img src="https://res.cloudinary.com/dbsxvvnku/image/upload/v1779261790/unnamed_lbmabi.jpg"
             alt="Francisco Graça"
             class="hero-photo">

        <h1>Francisco Graça</h1>
        <p class="subtitle">
            Estudante de Engenharia Informática · Universidade Lusófona<br>
            <small style="opacity:.6;">Apaixonado por desenvolvimento web, Python e Django</small>
        </p>

        <nav class="hero-nav">
            <a href="{% url 'portfolio:home' %}">Sobre mim</a>
            <a href="{% url 'portfolio:projetos' %}">Projetos</a>
            <a href="{% url 'portfolio:tecnologias' %}">Tecnologias</a>
            <a href="{% url 'artigos:lista' %}">Artigos</a>
            <a href="{% url 'portfolio:makingof' %}">Making Of</a>
            <a href="https://github.com/FranciscoGraca1/franciscograca22409338" target="_blank" class="highlight">GitHub</a>
        </nav>
    </div>

    <div class="scroll-hint">▼ explorar</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
