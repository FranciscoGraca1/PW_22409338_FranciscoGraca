{% extends 'portfolio/base.html' %}
{% block content %}
<h2>{{ titulo }}</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit text" class="btn btn-success">Guardar</button>
    <a href="{% url 'portfolio:projetos' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
